name: Process Guestbook Entry

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  process:
    # Only run on issues with the guestbook label
    if: contains(github.event.issue.labels.*.name, 'guestbook')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Parse issue and create guestbook entry
        id: process
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          node .github/scripts/process-guestbook-issue.js

      - name: Commit and push new entry
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add guestbook/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "feat(guestbook): add entry for ${{ github.event.issue.user.login }} (#${{ github.event.issue.number }})"
            git push
          fi

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            const username = context.payload.issue.user.login;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `✅ **Guestbook entry processed!**`,
                ``,
                `Your page has been created at \`guestbook/${username}/index.html\` and will be live shortly after the Pages deployment finishes.`,
                ``,
                `🔗 Once deployed, visit: \`https://${context.repo.owner}.github.io/${context.repo.repo}/guestbook/${username}/\``,
              ].join('\n'),
            });
